# Mocha App Picker — catálogo de apps
# Schema:
#   id        slug estável (usado no código Rust e como key em strings.*.toml)
#   pkg       nome real do pacote (attr nixpkgs OU app id flatpak)
#   tab       aba de exibição (deve existir em strings.*.toml [tabs])
#   backend   "nixpkgs" | "flatpak" | "special"
#   note_key  opcional; se presente, busca em notes.<lang>.toml

# ---------- browsers ----------
[[app]]
id = "brave"
pkg = "brave"
tab = "browsers"
backend = "nixpkgs"

